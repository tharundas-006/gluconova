<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gluconova Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="dashboard">
        <!-- Header -->
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-microchip"></i>
                <span>Gluconova</span>
            </div>
            <div class="nav-user">
                <span id="userName"></span>
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="dashboard-content">
            <!-- Glucose Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-tint"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Current Glucose</h3>
                        <div class="stat-value" id="currentGlucose">--</div>
                        <small>mg/dL</small>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="stat-info">
                        <h3>7-Day Average</h3>
                        <div class="stat-value" id="avgGlucose">--</div>
                        <small>mg/dL</small>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-microchip"></i>
                    </div>
                    <div class="stat-info">
                        <h3>ESP32 Status</h3>
                        <div class="stat-value" id="esp32Status">
                            <i class="fas fa-circle"></i> Online
                        </div>
                        <small id="lastSync">Last sync: --</small>
                    </div>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="chart-card">
                <div class="card-header">
                    <h2><i class="fas fa-chart-line"></i> Glucose Trend</h2>
                    <button id="simulateEsp32" class="btn-primary">
                        <i class="fas fa-syringe"></i> Simulate ESP32 Reading
                    </button>
                </div>
                <canvas id="glucoseChart" height="300"></canvas>
            </div>

            <!-- Food & AI Section -->
            <div class="two-columns">
                <!-- Food Predictor -->
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-utensils"></i> AI Food Impact Predictor</h2>
                    </div>
                    <div class="food-predictor">
                        <div class="input-group">
                            <i class="fas fa-apple-alt"></i>
                            <input type="text" id="foodInput" placeholder="Enter food name (e.g., Pizza, Apple, Rice)">
                        </div>
                        <button id="predictFoodBtn" class="btn-secondary">
                            <i class="fas fa-brain"></i> Predict Impact
                        </button>
                        <div id="predictionResult" class="prediction-result hidden"></div>
                    </div>
                </div>

                <!-- Weekly Report -->
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-calendar-week"></i> Weekly Food Impact Report</h2>
                    </div>
                    <div id="weeklyReport" class="weekly-report">
                        <p class="text-muted">Log meals to see insights...</p>
                    </div>
                </div>
            </div>

            <!-- AI Insights & Recent Readings -->
            <div class="two-columns">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-robot"></i> AI Health Insights</h2>
                    </div>
                    <div id="aiInsights" class="insights-list"></div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-history"></i> Recent Readings</h2>
                    </div>
                    <div id="recentReadings" class="readings-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
